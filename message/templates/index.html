<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LAN Announcements</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Local Socket.IO client -->
    <script src="/static/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            padding: 10px;
            background: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        header div {
            font-weight: bold;
        }

        #nameInput {
            padding: 8px;
            border-radius: 5px;
            border: none;
            width: 200px;
        }

        #joinBtn {
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #joinBtn:hover {
            background: #16a34a;
        }

        main {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Left: announcements */
        #announceSection {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1f2937;
        }

        #announceTitle {
            padding: 8px 10px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            font-weight: bold;
        }

        #announceBox {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #020617;
        }

        .msg {
            margin: 6px 0;
            font-size: 14px;
        }

        .announcement {
            color: #facc15;
        }

        .system {
            color: #38bdf8;
            font-style: italic;
        }

        .meta {
            font-size: 11px;
            color: #9ca3af;
        }

        /* Right: user list + admin controls */
        #sideSection {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #usersTitle {
            padding: 8px 10px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            font-weight: bold;
        }

        #userList {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #020617;
            font-size: 14px;
        }

        #adminPanel {
            padding: 10px;
            background: #1e293b;
            border-top: 1px solid #1f2937;
            font-size: 13px;
        }

        #adminText,
        #adminPassword {
            padding: 6px;
            border-radius: 5px;
            border: none;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 5px;
        }

        #adminSendBtn {
            padding: 6px;
            border-radius: 5px;
            border: none;
            background: #f59e0b;
            color: black;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        #adminSendBtn:hover {
            background: #d97706;
        }

        #statusText {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
    </style>
</head>

<body>

<header>
    <div>🌐 LAN Announcements</div>
    <div>
        <input id="nameInput" placeholder="Enter your name">
        <button id="joinBtn">Join</button>
    </div>
</header>

<main>
    <!-- Announcements area -->
    <section id="announceSection">
        <div id="announceTitle">📢 Announcements</div>
        <div id="announceBox"></div>
    </section>

    <!-- Right side: connected users + admin panel -->
    <section id="sideSection">
        <div id="usersTitle">👥 Connected users</div>
        <div id="userList">
            <div style="font-size:13px;color:#9ca3af;">
                Join with your name to appear here.
            </div>
        </div>

        <!-- Admin panel (only works with correct password) -->
        <div id="adminPanel">
            <div><b>Admin only</b> – send announcement:</div>
            <input id="adminText" placeholder="Announcement text...">
            <input id="adminPassword" placeholder="Admin password">
            <button id="adminSendBtn">Send announcement</button>
            <div id="statusText">Normal users can only read announcements.</div>
        </div>
    </section>
</main>

<script>
    const socket = io();

    const nameInput = document.getElementById("nameInput");
    const joinBtn = document.getElementById("joinBtn");

    const announceBox = document.getElementById("announceBox");
    const userListBox = document.getElementById("userList");

    const adminText = document.getElementById("adminText");
    const adminPassword = document.getElementById("adminPassword");
    const adminSendBtn = document.getElementById("adminSendBtn");
    const statusText = document.getElementById("statusText");

    let myName = "";

    function addMessage(msg, cssClass) {
        const div = document.createElement("div");
        div.classList.add("msg");
        if (cssClass) div.classList.add(cssClass);

        let text = "";
        if (msg.type === "announcement") {
            text = `<b>${msg.sender}</b>: ${msg.text}`;
        } else {
            text = msg.text; // system messages
        }

        const meta = msg.timestamp ? `<div class="meta">${msg.timestamp}</div>` : "";
        div.innerHTML = text + meta;

        announceBox.appendChild(div);
        announceBox.scrollTop = announceBox.scrollHeight;
    }

    function updateUserList(users) {
        userListBox.innerHTML = "";
        if (!users || users.length === 0) {
            userListBox.innerHTML = `<div style="font-size:13px;color:#9ca3af;">
                No users joined yet.
            </div>`;
            return;
        }
        users.forEach(u => {
            const div = document.createElement("div");
            div.textContent = `${u.name}`;
            userListBox.appendChild(div);
        });
    }

    socket.on("connect", () => {
        console.log("Connected to server");
    });

    socket.on("connect_error", (err) => {
        console.error("Connection error:", err);
    });

    socket.on("history", (history) => {
        (history.announcements || []).forEach(msg => {
            addMessage(msg, "announcement");
        });
    });

    socket.on("announcement_message", (msg) => {
        addMessage(msg, "announcement");
    });

    socket.on("system_message", (msg) => {
        addMessage(msg, "system");
    });

    socket.on("user_list", (users) => {
        updateUserList(users);
    });

    socket.on("error_message", (msg) => {
        alert(msg.text || "Error");
    });

    function joinWithName() {
        const name = nameInput.value.trim();
        if (!name) {
            alert("Please enter your name first.");
            return;
        }
        myName = name;
        socket.emit("register_name", { name: myName });
        statusText.textContent = `You are joined as: ${myName}`;
    }

    joinBtn.addEventListener("click", joinWithName);
    nameInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            joinWithName();
        }
    });

    function sendAdminAnnouncement() {
        const text = adminText.value.trim();
        const pwd = adminPassword.value.trim();
        if (!text) return;

        socket.emit("send_announcement", {
            text: text,
            sender: myName || "Admin",
            admin_password: pwd
        });

        adminText.value = "";
    }

    adminSendBtn.addEventListener("click", sendAdminAnnouncement);
</script>

</body>
</html>
